<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Restrito - Painel de Prazos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body { font-family: 'Inter', sans-serif; transition: background 0.8s ease; overflow-x: hidden; }
        .perspectiva { perspective: 1000px; }
        .preservar-3d { transform-style: preserve-3d; transition: transform 0.1s ease-out; }
        .saltar-fora { transform: translateZ(50px); }
        #shackle { transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
        .unlocked #shackle { transform: translateY(-6px); }
    </style>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body id="body-bg" class="min-h-screen flex items-center justify-center p-4 perspectiva bg-cover bg-center bg-no-repeat bg-fixed" style="background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(4, 9, 20, 0.8)), url('/assets/login.jpg');">
    
    <div id="painel-login" class="w-full max-w-md relative z-10 mx-auto preservar-3d bg-white/10 backdrop-blur-xl p-8 rounded-3xl border border-white/20 shadow-[0_0_50px_rgba(0,0,0,0.5)] text-white">
        
        <div class="text-center mb-6 sm:mb-8 saltar-fora">
            <div id="icon-bg" class="w-20 h-20 sm:w-24 sm:h-24 rounded-full mx-auto flex items-center justify-center mb-4 sm:mb-6 transition-all">
                <svg id="lock-icon" xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 sm:h-12 sm:w-12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path id="shackle" d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
            </div>
            <h2 id="titulo-login" class="text-2xl font-black transition-all">Acesso Restrito</h2>
            <p id="subtitulo-login" class="mt-2 text-xs sm:text-sm opacity-80 transition-all">Só para registrados</p>
        </div>

        <div id="tela-bloqueio" class="hidden text-center saltar-fora p-6 bg-red-900/50 rounded-xl border-2 border-red-500">
            <h3 class="text-xl font-bold text-white mb-2">🚫 BLOQUEADO!</h3>
            <p class="text-gray-200 mb-4 text-sm">Muitas tentativas falhas. Aguarde:</p>
            <div id="cronometro" class="text-4xl font-mono font-black text-white animate-pulse">20:00</div>
        </div>

        <form id="form-login" action="/fazer-login" method="POST" class="space-y-4 sm:space-y-6">
            <input type="hidden" name="etapa" id="input-etapa" value="1">

            <div id="bloco-credenciais" class="space-y-4 sm:space-y-6 transition-all">
                <div class="saltar-pouco">
                    <label id="label-user" class="block font-bold mb-1">Usuário</label>
                    <input type="text" name="usuario" id="input-usuario" class="w-full outline-none transition-all focus:ring-2 ring-offset-2 ring-cyan-500">
                </div>
                
                <div class="saltar-pouco">
                    <label id="label-pass" class="block font-bold mb-1">Senha</label>
                    <input type="password" name="senha" id="input-senha" class="w-full outline-none transition-all focus:ring-2 ring-offset-2 ring-cyan-500">
                    
                    <div class="text-right mt-2">
                        <a href="#" id="btn-esqueci-senha" class="text-xs sm:text-sm font-semibold opacity-70 hover:opacity-100 transition-opacity" style="color: inherit;">
                            Esqueci minha senha
                        </a>
                    </div>
                </div>

                <div id="captcha-container" class="flex justify-center pt-2">
                    <div class="cf-turnstile" 
                        data-sitekey="0x4AAAAAAChuF9-2mkDLwgOu"  
                        data-callback="enableBtn"></div>
                </div>
            </div>

            <div id="bloco-2fa" class="hidden space-y-4 sm:space-y-6 saltar-fora">
                <div class="text-center mb-2">
                    <p class="font-black text-cyan-400 text-lg mb-1">✅ Senha Correta</p>
                    <p class="text-sm opacity-80">Abra seu Google Authenticator para continuar</p>
                </div>
                <div class="saltar-pouco">
                    <input type="text" name="token2fa" id="input-2fa" placeholder="000 000" maxlength="7" inputmode="numeric" 
                           class="w-full outline-none transition-all focus:ring-2 ring-offset-2 ring-cyan-500 text-center font-mono text-2xl tracking-[0.3em] py-4">
                </div>
            </div>
            
            <div id="alerta-erro" class="hidden mb-6 p-4 rounded-xl text-xs sm:text-sm text-center font-bold saltar-fora bg-red-500 text-white"></div>

            <div class="saltar-fora pt-2">
                <button type="submit" id="btn-final" class="hidden w-full font-black py-4 transition-all hover:brightness-110">
                    Verificar Identidade
                </button>
            </div>
        </form>
    </div>

    <script>
        const TEMPO_BLOQUEIO_MINUTOS = 20; 

        const designs = [
            { iconBg: "bg-cyan-500 text-slate-900", btn: "bg-cyan-500 hover:bg-cyan-400 text-slate-950 font-bold rounded-xl px-6 py-3 transition-colors", input: "bg-slate-900/60 border border-slate-700/50 p-3 rounded-lg text-cyan-400 focus:border-cyan-500 focus:outline-none" },
            { iconBg: "bg-yellow-400 text-black", btn: "bg-yellow-400 text-black border border-black/50 font-black uppercase tracking-widest hover:translate-y-1 transition-transform px-6 py-3 rounded-lg", input: "bg-zinc-900/60 border border-zinc-700/50 p-3 rounded-lg text-yellow-400 font-mono focus:border-yellow-400 focus:outline-none" },
            { iconBg: "bg-gradient-to-br from-indigo-400 to-cyan-400 text-black shadow-lg", btn: "bg-gradient-to-r from-indigo-500 via-cyan-400 to-indigo-500 text-black font-semibold rounded-xl px-6 py-3 hover:scale-105 transition-all duration-300", input: "bg-slate-900/60 border border-indigo-500/40 p-3 rounded-xl text-indigo-200 focus:border-cyan-400 focus:outline-none" },
            { iconBg: "bg-emerald-500 text-emerald-950", btn: "bg-emerald-500 hover:bg-emerald-400 text-emerald-950 font-bold rounded-full px-6 py-3 transition-colors", input: "bg-emerald-950/60 border border-emerald-700/50 p-3 rounded-xl text-emerald-100 placeholder-emerald-600 focus:border-emerald-500 focus:outline-none" },
            { iconBg: "bg-fuchsia-500 text-white", btn: "bg-gradient-to-r from-purple-600 to-fuchsia-600 hover:from-purple-500 hover:to-fuchsia-500 text-white font-semibold rounded-2xl px-6 py-3 transition-all", input: "bg-purple-900/60 border border-purple-700/50 p-3 rounded-xl text-purple-100 placeholder-purple-400 focus:border-fuchsia-500 focus:outline-none" },
            { iconBg: "bg-red-600 text-white", btn: "bg-red-600 hover:bg-red-500 text-white font-black uppercase tracking-wider px-8 py-3 rounded-md transition-colors", input: "bg-neutral-900/60 border border-neutral-700/50 p-3 text-red-50 rounded-md placeholder-neutral-500 focus:border-red-600 focus:outline-none" },
            { iconBg: "bg-gradient-to-r from-rose-400 to-orange-400 text-white", btn: "bg-gradient-to-r from-rose-500 to-orange-500 hover:from-rose-400 hover:to-orange-400 text-white font-semibold rounded-full px-6 py-3 transition-transform hover:-translate-y-1", input: "bg-black/40 border border-rose-300/30 p-3 rounded-2xl text-orange-200 placeholder-gray-400 focus:border-rose-400 focus:outline-none transition-all" },
            { iconBg: "bg-blue-500 text-white", btn: "bg-blue-600 hover:bg-blue-500 text-white font-medium rounded-md px-6 py-3 transition-colors", input: "bg-blue-950/60 border border-blue-800/50 p-3 rounded-md text-blue-100 placeholder-blue-400 focus:border-blue-400 focus:outline-none" },
            { iconBg: "bg-green-500 text-black", btn: "bg-transparent border-2 border-green-500 text-green-400 hover:bg-green-500 hover:text-black font-mono px-6 py-3 rounded transition-colors", input: "bg-black/60 border border-green-500/50 p-3 rounded-md text-green-400 font-mono placeholder-green-800 focus:border-green-400 focus:outline-none" }
        ];

        const tema = designs[Math.floor(Math.random() * designs.length)];
        
        document.getElementById('icon-bg').className += " " + tema.iconBg;
        document.getElementById('input-usuario').className += " " + tema.input;
        document.getElementById('input-senha').className += " " + tema.input;
        document.getElementById('input-2fa').className += " " + tema.input; 
        document.getElementById('btn-final').className += " " + tema.btn;

        const painel = document.getElementById('painel-login');
        document.addEventListener('mousemove', (e) => {
            let x = (window.innerWidth / 2 - e.pageX) / 30;
            let y = (window.innerHeight / 2 - e.pageY) / 30;
            painel.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
        });

        window.onload = () => {
            verificarStatusBloqueio();

            const urlParams = new URLSearchParams(window.location.search);
            const erro = urlParams.get('erro');
            const step = urlParams.get('step'); 
            
            if (erro) {
                if (erro === 'bloqueado') {
                    iniciarBloqueioVisual();
                } else {
                    const divErro = document.getElementById('alerta-erro');
                    divErro.classList.remove('hidden');
                    if (erro === 'senha') divErro.innerText = "❌ Usuário ou senha incorretos.";
                    else if (erro === 'captcha') divErro.innerText = "🤖 Falha na verificação de segurança.";
                    else if (erro === '2fa') divErro.innerText = "🔐 Código 2FA Inválido. Volte e tente novamente.";
                }
            }

            // CONTROLE DE ETAPAS
            if (step === '2fa') {
                document.getElementById('bloco-credenciais').classList.add('hidden');
                document.getElementById('bloco-2fa').classList.remove('hidden');
                document.getElementById('input-etapa').value = '2'; 
                
                document.getElementById('input-usuario').removeAttribute('required');
                document.getElementById('input-senha').removeAttribute('required');
                document.getElementById('input-2fa').setAttribute('required', 'true');
                
                document.getElementById('titulo-login').innerText = "Autenticação Dupla";
                document.getElementById('subtitulo-login').innerText = "Etapa 2 de 2";
                
                document.getElementById('lock-icon').classList.add('unlocked');
                const btn = document.getElementById('btn-final');
                btn.innerText = "Entrar no Sistema";
                btn.classList.remove('hidden');
                
                setTimeout(() => document.getElementById('input-2fa').focus(), 100);
            } else {
                document.getElementById('input-usuario').setAttribute('required', 'true');
                document.getElementById('input-senha').setAttribute('required', 'true');
                document.getElementById('input-2fa').removeAttribute('required');
            }
        };

        document.getElementById('btn-esqueci-senha').addEventListener('click', function(e) {
            e.preventDefault(); 
            
            Swal.fire({
                icon: 'info',
                title: 'Aviso Importante!',
                html: '<p style="font-size: 15px;">Para garantir a proteção dos dados, a redefinição de senha e do token deve ser solicitada diretamente ao Administrador do sistema.</p><br><p style="font-size: 14px; font-weight: bold;">Por favor, contate o administrador.</p>',
                confirmButtonText: 'Entendi',
                confirmButtonColor: '#3085d6',
                background: document.body.style.backgroundColor || '#fff', 
            });
        });

        function iniciarBloqueioVisual() {
            const tempoDesbloqueio = Date.now() + (TEMPO_BLOQUEIO_MINUTOS * 60 * 1000);
            localStorage.setItem('bloqueio_ate', tempoDesbloqueio);
            aplicarBloqueio(tempoDesbloqueio);
        }

        function verificarStatusBloqueio() {
            const bloqueioAte = localStorage.getItem('bloqueio_ate');
            if (bloqueioAte) {
                if (Date.now() < parseInt(bloqueioAte)) {
                    aplicarBloqueio(parseInt(bloqueioAte));
                } else {
                    localStorage.removeItem('bloqueio_ate'); // Já expirou
                }
            }
        }

        function aplicarBloqueio(tempoFinal) {
            document.getElementById('form-login').classList.add('hidden');
            document.getElementById('tela-bloqueio').classList.remove('hidden');
            document.getElementById('titulo-login').innerText = "Sistema Travado";
            document.getElementById('subtitulo-login').innerText = "IP temporariamente banido";
            document.getElementById('icon-bg').className = "w-24 h-24 rounded-full mx-auto flex items-center justify-center mb-6 bg-red-600 text-white";

            const intervalo = setInterval(() => {
                const agora = Date.now();
                const restante = tempoFinal - agora;

                if (restante <= 0) {
                    clearInterval(intervalo);
                    localStorage.removeItem('bloqueio_ate');
                    window.location.href = '/login'; 
                    return;
                }

                const minutos = Math.floor((restante % (1000 * 60 * 60)) / (1000 * 60));
                const segundos = Math.floor((restante % (1000 * 60)) / 1000);
                document.getElementById('cronometro').innerText = 
                    `${minutos.toString().padStart(2, '0')}:${segundos.toString().padStart(2, '0')}`;
            }, 1000);
        }

        function enableBtn() {
            const btn = document.getElementById('btn-final');
            btn.classList.remove('hidden');
            btn.classList.add('animate-bounce');
        }
    </script>
</body>
</html>
